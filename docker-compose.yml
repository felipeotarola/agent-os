services:
  caddy:
    image: caddy:2-alpine
    container_name: agent-os-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bridge

  bridge:
    image: node:22-bookworm-slim
    container_name: agent-os-bridge
    restart: unless-stopped
    working_dir: /app
    command: node bridge/server.mjs
    environment:
      BRIDGE_PORT: 8787
      BRIDGE_DATABASE_URL: postgres://agent_os:${POSTGRES_PASSWORD:-agent_os_local_password}@127.0.0.1:${POSTGRES_PORT:-5433}/${POSTGRES_DB:-agent_os}
      AGENT_OS_BRIDGE_TOKEN: ${AGENT_OS_BRIDGE_TOKEN:?AGENT_OS_BRIDGE_TOKEN is required}
      AGENT_OS_AGENTS_JSON: ${AGENT_OS_AGENTS_JSON:-[]}
      AGENT_OS_GMAIL_ACCOUNT: ${AGENT_OS_GMAIL_ACCOUNT:-feot1000@gmail.com}
    volumes:
      - ./:/app:ro
      - /root/.openclaw:/root/.openclaw:ro
      - /root/.openclaw/secrets/agent-os:/root/.openclaw/secrets/agent-os:rw
      - /root/.openclaw/identity:/root/.openclaw/identity:rw
      - /root/.openclaw/agents/main/sessions:/root/.openclaw/agents/main/sessions:rw
      - /root/.openclaw/agents/main/agent:/root/.openclaw/agents/main/agent:rw
      - /root/.openclaw/tasks:/root/.openclaw/tasks:rw
      - /root/.openclaw/flows:/root/.openclaw/flows:rw
      - /root/.config/gogcli:/root/.config/gogcli:ro
      - /root/.openclaw/bin/gog:/usr/local/bin/gog:ro
      - /etc/ssl/certs:/etc/ssl/certs:ro
      - /usr/bin/openclaw:/usr/bin/openclaw:ro
      - ./bridge/bin/qmd:/usr/bin/qmd:ro
      - /usr/lib/node_modules/openclaw:/usr/lib/node_modules/openclaw:ro
      - /usr/lib/node_modules/@tobilu/qmd:/usr/lib/node_modules/@tobilu/qmd:ro
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: agent-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_os}
      POSTGRES_USER: ${POSTGRES_USER:-agent_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_os_local_password}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5433}:5432'
    volumes:
      - agent_os_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-agent_os} -d ${POSTGRES_DB:-agent_os}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agent_os_postgres_data:
  caddy_data:
  caddy_config:
