services:
  caddy:
    image: caddy:2-alpine
    container_name: agent-os-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bridge

  bridge:
    image: node:22-bookworm-slim
    container_name: agent-os-bridge
    restart: unless-stopped
    working_dir: /app
    command: node bridge/server.mjs
    environment:
      BRIDGE_PORT: 8787
      BRIDGE_DATABASE_URL: postgres://agent_os:${POSTGRES_PASSWORD:-agent_os_local_password}@postgres:5432/${POSTGRES_DB:-agent_os}
      AGENT_OS_BRIDGE_TOKEN: ${AGENT_OS_BRIDGE_TOKEN:?AGENT_OS_BRIDGE_TOKEN is required}
      AGENT_OS_AGENTS_JSON: ${AGENT_OS_AGENTS_JSON:-[]}
    volumes:
      - ./:/app:ro
      - /root/.openclaw:/root/.openclaw:ro
      - /usr/bin/openclaw:/usr/bin/openclaw:ro
      - ./bridge/bin/qmd:/usr/bin/qmd:ro
      - /usr/lib/node_modules/openclaw:/usr/lib/node_modules/openclaw:ro
      - /usr/lib/node_modules/@tobilu/qmd:/usr/lib/node_modules/@tobilu/qmd:ro
    expose:
      - '8787'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: agent-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_os}
      POSTGRES_USER: ${POSTGRES_USER:-agent_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_os_local_password}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5433}:5432'
    volumes:
      - agent_os_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-agent_os} -d ${POSTGRES_DB:-agent_os}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agent_os_postgres_data:
  caddy_data:
  caddy_config:
